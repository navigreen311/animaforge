version: "3.9"

# Development overrides — use with:
#   docker compose -f docker/docker-compose.prod.yml -f docker/docker-compose.dev.yml up

services:
  # ── Infrastructure (expose ports for local tooling) ─────────
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  elasticsearch:
    ports:
      - "9200:9200"

  # ── Application Services ────────────────────────────────────
  web:
    volumes:
      - ../apps/web/src:/app/src
      - ../apps/web/public:/app/public
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    environment:
      NODE_ENV: development

  platform-api:
    volumes:
      - ../services/platform-api/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3001:3001"
      - "9229:9229"
    environment:
      NODE_ENV: development

  realtime:
    volumes:
      - ../services/realtime/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3002:3002"
      - "9230:9229"
    environment:
      NODE_ENV: development

  auth:
    volumes:
      - ../services/auth/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3003:3003"
      - "9231:9229"
    environment:
      NODE_ENV: development

  billing:
    volumes:
      - ../services/billing/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3004:3004"
      - "9232:9229"
    environment:
      NODE_ENV: development

  workers:
    volumes:
      - ../services/workers/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "9233:9229"
    environment:
      NODE_ENV: development

  ai-api:
    volumes:
      - ../services/ai-api/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"

  # ── Governance Services ─────────────────────────────────────
  moderation:
    volumes:
      - ../services/governance/moderation/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3005:3005"
      - "9234:9229"
    environment:
      NODE_ENV: development

  c2pa:
    volumes:
      - ../services/governance/c2pa/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3006:3006"
      - "9235:9229"
    environment:
      NODE_ENV: development

  watermark:
    volumes:
      - ../services/governance/watermark/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3007:3007"
      - "9236:9229"
    environment:
      NODE_ENV: development

  consent:
    volumes:
      - ../services/governance/consent/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    ports:
      - "3008:3008"
      - "9237:9229"
    environment:
      NODE_ENV: development
