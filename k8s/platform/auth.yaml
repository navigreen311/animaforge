apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: auth
      containers:
        - name: auth
          image: animaforge/auth:latest
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: JWT_ISSUER
              value: "https://auth.animaforge.com"
            - name: TOKEN_EXPIRY
              value: "3600"
            - name: REFRESH_TOKEN_EXPIRY
              value: "2592000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth
  namespace: animaforge-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
