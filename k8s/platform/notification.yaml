apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: notification
      containers:
        - name: notification
          image: animaforge/notification:latest
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3004"
            - name: EMAIL_PROVIDER
              value: "ses"
            - name: PUSH_PROVIDER
              value: "fcm"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification
  namespace: animaforge-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
