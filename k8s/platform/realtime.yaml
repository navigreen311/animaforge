apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: realtime
      containers:
        - name: realtime
          image: animaforge/realtime:latest
          ports:
            - containerPort: 3001
              name: ws
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: WS_HEARTBEAT_INTERVAL
              value: "30000"
            - name: WS_MAX_CONNECTIONS_PER_POD
              value: "5000"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: realtime
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: realtime
  ports:
    - port: 80
      targetPort: ws
      protocol: TCP
      name: ws
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-headless
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: realtime
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: realtime
  ports:
    - port: 3001
      targetPort: ws
      protocol: TCP
      name: ws
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realtime
  namespace: animaforge-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: realtime
  minReplicas: 5
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: websocket_active_connections
        target:
          type: AverageValue
          averageValue: "4000"
