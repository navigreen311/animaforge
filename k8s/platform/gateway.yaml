apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: gateway
      containers:
        - name: gateway
          image: animaforge/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: UPSTREAM_PLATFORM_API
              value: "http://platform-api.animaforge-platform.svc.cluster.local"
            - name: UPSTREAM_AUTH
              value: "http://auth.animaforge-platform.svc.cluster.local"
            - name: UPSTREAM_BILLING
              value: "http://billing.animaforge-platform.svc.cluster.local"
            - name: UPSTREAM_REALTIME
              value: "http://realtime.animaforge-platform.svc.cluster.local"
            - name: UPSTREAM_INFERENCE
              value: "http://inference-api.animaforge-ai.svc.cluster.local"
            - name: UPSTREAM_MODERATION
              value: "http://moderation.animaforge-governance.svc.cluster.local"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: animaforge
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 443
      targetPort: http
      protocol: TCP
      name: https
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: animaforge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.animaforge.com
      secretName: gateway-tls
  rules:
    - host: api.animaforge.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: animaforge-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
