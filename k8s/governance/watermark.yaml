apiVersion: apps/v1
kind: Deployment
metadata:
  name: watermark
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: watermark
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: watermark
  template:
    metadata:
      labels:
        app.kubernetes.io/name: watermark
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: watermark
      containers:
        - name: watermark
          image: animaforge/watermark:latest
          ports:
            - containerPort: 8012
              name: http
          env:
            - name: PORT
              value: "8012"
            - name: WATERMARK_TYPE
              value: "invisible"
            - name: WATERMARK_STRENGTH
              value: "0.7"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: watermark
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: watermark
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: watermark
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: watermark
  namespace: animaforge-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: watermark
  minReplicas: 3
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
