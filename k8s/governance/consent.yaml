apiVersion: apps/v1
kind: Deployment
metadata:
  name: consent
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: consent
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: consent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: consent
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: consent
      containers:
        - name: consent
          image: animaforge/consent:latest
          ports:
            - containerPort: 8013
              name: http
          env:
            - name: PORT
              value: "8013"
            - name: CONSENT_VERIFICATION_MODE
              value: "strict"
            - name: GDPR_COMPLIANCE
              value: "enabled"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: consent
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: consent
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: consent
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: consent
  namespace: animaforge-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: consent
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
