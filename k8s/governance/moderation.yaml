apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: moderation
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: moderation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moderation
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: moderation
      containers:
        - name: moderation
          image: animaforge/moderation:latest
          ports:
            - containerPort: 8010
              name: http
          env:
            - name: PORT
              value: "8010"
            - name: MODERATION_STRICTNESS
              value: "high"
            - name: NSFW_THRESHOLD
              value: "0.85"
            - name: DEEPFAKE_DETECTION
              value: "enabled"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: moderation
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: moderation
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: moderation
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moderation
  namespace: animaforge-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moderation
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
