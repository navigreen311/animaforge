apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2pa-signer
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: c2pa-signer
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: c2pa-signer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c2pa-signer
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: c2pa-signer
      containers:
        - name: c2pa-signer
          image: animaforge/c2pa-signer:latest
          ports:
            - containerPort: 8011
              name: http
          env:
            - name: PORT
              value: "8011"
            - name: C2PA_MANIFEST_VERSION
              value: "2.0"
            - name: SIGNING_ALGORITHM
              value: "ES256"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: c2pa-signer
  namespace: animaforge-governance
  labels:
    app.kubernetes.io/name: c2pa-signer
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: c2pa-signer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: c2pa-signer
  namespace: animaforge-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: c2pa-signer
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
