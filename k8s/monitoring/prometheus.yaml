apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-services
  namespace: animaforge-platform
  labels:
    app.kubernetes.io/part-of: animaforge
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: animaforge
  namespaceSelector:
    matchNames:
      - animaforge-platform
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-services
  namespace: animaforge-ai
  labels:
