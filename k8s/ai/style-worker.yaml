apiVersion: apps/v1
kind: Deployment
metadata:
  name: style-worker
  namespace: animaforge-ai
  labels:
    app.kubernetes.io/name: style-worker
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: style-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: style-worker
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: style-worker
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: style-worker
          image: animaforge/style-worker:latest
          env:
            - name: WORKER_TYPE
              value: "style"
            - name: QUEUE_NAME
              value: "style-transfer"
            - name: MODEL_CACHE_DIR
              value: "/models"
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 30Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: style-worker
  namespace: animaforge-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: style-worker
  minReplicas: 0
  maxReplicas: 15
  metrics:
    - type: Pods
      pods:
        metric:
          name: queue_depth_style
        target:
          type: AverageValue
          averageValue: "2"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
