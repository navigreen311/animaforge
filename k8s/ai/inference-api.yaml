apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: animaforge-ai
  labels:
    app.kubernetes.io/name: inference-api
    app.kubernetes.io/part-of: animaforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-api
        app.kubernetes.io/part-of: animaforge
    spec:
      serviceAccountName: inference-api
      containers:
        - name: inference-api
          image: animaforge/inference-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: QUEUE_BACKEND
              value: "redis"
            - name: MAX_CONCURRENT_JOBS
              value: "50"
            - name: JOB_TIMEOUT_SECONDS
              value: "600"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: animaforge-ai
  labels:
    app.kubernetes.io/name: inference-api
    app.kubernetes.io/part-of: animaforge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inference-api
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-api
  namespace: animaforge-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: queue_depth
        target:
          type: AverageValue
          averageValue: "10"
