apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: animaforge-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: animaforge
data:
  REDIS_HOST: "animaforge-prod.xxxxxx.0001.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"
  REDIS_TLS_ENABLED: "true"
  REDIS_CLUSTER_MODE: "enabled"
  REDIS_MAX_RETRIES: "3"
  REDIS_RETRY_DELAY_MS: "200"
  REDIS_CONNECT_TIMEOUT_MS: "5000"
  REDIS_COMMAND_TIMEOUT_MS: "3000"
  REDIS_DB_CACHE: "0"
  REDIS_DB_SESSIONS: "1"
  REDIS_DB_QUEUE: "2"
  REDIS_DB_RATE_LIMIT: "3"
